<div class="layout-topbar shadow-sm">
  <div class="layout-topbar-logo-container">
    <button class="layout-menu-button layout-topbar-action"
      (click)="layoutService.onMenuToggle()">
      <i class="pi pi-bars"></i>
    </button>

    <a class="cursor-pointer" routerLink="/">
      <span class="text-lg font-semibold text-primary-500 dark:text-primary-300 "> Boilerplate </span>
    </a>
  </div>

  <div class="layout-topbar-actions">
    <div class="layout-config-menu">
      <button type="button" class="layout-topbar-action" (click)="toggleDarkMode()">
        <i [ngClass]="{ 'pi ': true, 'pi-moon': layoutService.isDarkTheme(), 'pi-sun': !layoutService.isDarkTheme() }"></i>
      </button>

      <div class="relative">
        <button class="layout-topbar-action layout-topbar-action-highlight"
          pStyleClass="@next"
          enterFromClass="hidden"
          enterActiveClass="animate-scalein"
          leaveToClass="hidden"
          leaveActiveClass="animate-fadeout"
          [hideOnOutsideClick]="true">
          <i class="pi pi-palette"></i>
        </button>
        <app-configurator />
      </div>
    </div>
  </div>
</div>
