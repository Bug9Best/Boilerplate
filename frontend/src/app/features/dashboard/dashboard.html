<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
  <p-card styleClass="shadow-sm">
    <div class="flex justify-between items-start">
      <div>
        <span class="block text-surface-500 dark:text-surface-400 font-medium mb-3">Total Users</span>
        <div class="text-surface-900 dark:text-surface-0 font-medium text-xl">1,234</div>
      </div>
      <div class="flex items-center justify-center bg-blue-100 dark:bg-blue-900 rounded-lg w-10 h-10">
        <i class="pi pi-users text-blue-500 text-xl"></i>
      </div>
    </div>
  </p-card>

  <p-card styleClass="shadow-sm">
    <div class="flex justify-between items-start">
      <div>
        <span class="block text-surface-500 dark:text-surface-400 font-medium mb-3">Revenue</span>
        <div class="text-surface-900 dark:text-surface-0 font-medium text-xl">$54,321</div>
      </div>
      <div class="flex items-center justify-center bg-green-100 dark:bg-green-900 rounded-lg w-10 h-10">
        <i class="pi pi-dollar text-green-500 text-xl"></i>
      </div>
    </div>
  </p-card>
</div>

<p-card styleClass="shadow-sm">
  <h3 class="mt-0 mb-4 text-xl font-medium text-surface-900 dark:text-surface-0">Activity Overview</h3>
  <highcharts-chart 
    [options]="chartOptions"
    style="width: 100%; height: 400px; display: block;"
  ></highcharts-chart>
</p-card>

<p-card styleClass="shadow-sm mt-3">
  <h3 class="mt-0 mb-4 text-xl font-medium text-surface-900 dark:text-surface-0">Activity Overview</h3>
  <highcharts-chart 
    [options]="chartOptions"
    style="width: 100%; height: 400px; display: block;"
  ></highcharts-chart>
</p-card>
